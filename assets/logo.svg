<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="100%" height="100%">
  <defs>
    <!-- Emerald Green Gradient for Organic Nature -->
    <linearGradient id="gooba-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Golden Amber Gradient for Tradition and Fire -->
    <linearGradient id="gooba-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Leaf + Circular Loop (Circular Bio-Economy) -->
  <g transform="translate(10, 5)">
    <!-- Circular loop -->
    <path d="M 25,5 C 36,5 45,14 45,25 C 45,36 36,45 25,45 C 14,45 5,36 5,25 C 5,17 10,10 17,7" stroke="url(#gooba-green)" stroke-width="4.5" stroke-linecap="round" fill="none" />
    <!-- Leaf veins and structure -->
    <path d="M 25,12 C 15,15 13,27 25,38 C 37,27 35,15 25,12 Z" fill="url(#gooba-amber)" opacity="0.9" />
    <path d="M 25,12 L 25,38" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  </g>
  
  <!-- Brand Text -->
  <text x="70" y="36" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="1.5">GOOBA</text>
  <text x="70" y="49" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="url(#gooba-green)" letter-spacing="3">EXPORT LLP</text>
</svg>

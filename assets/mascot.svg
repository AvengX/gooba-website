<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background radial glow -->
  <circle cx="250" cy="250" r="220" fill="url(#glow-grad)" filter="url(#glow)" />

  <!-- Outer Global Orbit Rings -->
  <ellipse cx="250" cy="250" rx="200" ry="80" stroke="url(#green-grad)" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(-30 250 250)" />
  <ellipse cx="250" cy="250" rx="200" ry="80" stroke="url(#gold-grad)" stroke-width="1.5" fill="none" opacity="0.2" transform="rotate(30 250 250)" />
  
  <!-- Outer Dash Ring -->
  <circle cx="250" cy="250" r="160" stroke="#10b981" stroke-width="1.5" stroke-dasharray="8 6" fill="none" opacity="0.4" />
  <circle cx="250" cy="250" r="140" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 4" fill="none" opacity="0.5" />

  <!-- Connecting trade nodes -->
  <g stroke="#10b981" stroke-width="1" opacity="0.4">
    <line x1="250" y1="90" x2="380" y2="180" />
    <line x1="380" y1="180" x2="350" y2="350" />
    <line x1="350" y1="350" x2="250" y2="410" />
    <line x1="250" y1="410" x2="150" y2="350" />
    <line x1="150" y1="350" x2="120" y2="180" />
    <line x1="120" y1="180" x2="250" y2="90" />
  </g>

  <!-- Node dots -->
  <circle cx="250" cy="90" r="6" fill="#f59e0b" filter="url(#glow)" />
  <circle cx="380" cy="180" r="5" fill="#10b981" />
  <circle cx="350" cy="350" r="6" fill="#f59e0b" />
  <circle cx="250" cy="410" r="5" fill="#10b981" />
  <circle cx="150" cy="350" r="6" fill="#f59e0b" />
  <circle cx="120" cy="180" r="5" fill="#10b981" />

  <!-- Center Piece: Growing Sprout / Plant + Globe Grid -->
  <!-- Globe Grid Lines -->
  <path d="M 170,250 C 170,180 330,180 330,250 C 330,320 170,320 170,250 Z" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2" />
  <path d="M 250,170 C 180,170 180,330 250,330 C 320,330 320,170 250,170 Z" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2" />
  <line x1="150" y1="250" x2="350" y2="250" stroke="#10b981" stroke-width="1" opacity="0.2" />
  <line x1="250" y1="150" x2="250" y2="350" stroke="#10b981" stroke-width="1" opacity="0.2" />

  <!-- Seed / Soil Base -->
  <path d="M 200,320 C 200,340 300,340 300,320 C 280,310 220,310 200,320 Z" fill="url(#gold-grad)" filter="url(#glow)" />
  
  <!-- Growing Sprout (Leaf 1) -->
  <path d="M 250,320 C 250,260 210,220 220,170 C 240,195 250,240 250,320 Z" fill="url(#green-grad)" filter="url(#glow)" />
  
  <!-- Growing Sprout (Leaf 2) -->
  <path d="M 250,300 C 255,250 295,210 280,165 C 265,190 255,235 250,300 Z" fill="url(#green-grad)" filter="url(#glow)" />

  <!-- Bud / Energy nodes inside seedling -->
  <circle cx="230" cy="180" r="3" fill="#ffffff" opacity="0.9" />
  <circle cx="270" cy="175" r="3" fill="#ffffff" opacity="0.9" />
  <circle cx="250" cy="230" r="4" fill="#f59e0b" filter="url(#glow)" />

  <!-- Sparkles -->
  <circle cx="220" cy="130" r="3" fill="#ffffff" opacity="0.7" />
  <circle cx="280" cy="120" r="2" fill="#10b981" opacity="0.5" />
  <circle cx="160" cy="220" r="4" fill="#f59e0b" opacity="0.6" filter="url(#glow)" />
  <circle cx="340" cy="230" r="3" fill="#ffffff" opacity="0.8" />
</svg>
